<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Slide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1); border-color: #6366f1; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .aspect-video { width: 100vw; height: 56.25vw; max-width: none; shadow: none; border: none; border-radius: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-[#f8fafc] flex items-center justify-center min-h-screen p-4">
    <!-- Slide Container -->
    <div class="w-full max-w-7xl aspect-video bg-white rounded-2xl shadow-2xl border border-slate-200 p-10 relative overflow-hidden flex flex-col">
        <!-- Optional Blueprint Overlay -->
        <div class="absolute inset-4 border-2 border-slate-100 border-dashed rounded-xl pointer-events-none"></div>

        <!-- Header -->
        <header class="relative z-10 mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight uppercase">Slide Title</h1>
                <p class="text-slate-500 text-sm mt-1">Subtitle or Category</p>
            </div>
            <div class="flex gap-2">
                <span class="px-2 py-1 rounded bg-indigo-50 text-indigo-600 border border-indigo-100 font-mono text-xs uppercase tracking-wider font-bold">Lab-v1.0</span>
            </div>
        </header>

        <!-- Content Area -->
        <main class="relative z-10 flex-grow grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Example Card -->
            <div class="bg-white rounded-xl border border-slate-200 p-6 card-hover flex flex-col gap-4">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-indigo-600 rounded-lg text-white shadow-md">
                        <i data-lucide="cpu" class="w-6 h-6"></i>
                    </div>
                    <h3 class="font-bold text-slate-900 text-lg">Technical Component</h3>
                </div>
                <p class="text-slate-600 text-sm leading-relaxed">
                    Detailed explanation of the technical component or process step goes here.
                </p>
                <div class="flex gap-2 mt-auto">
                    <span class="px-2 py-1 rounded bg-slate-100 text-slate-600 border border-slate-200 font-mono text-[10px]">#tag</span>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="relative z-10 mt-8 pt-6 border-t border-slate-100 flex justify-between items-center text-slate-400 text-xs font-mono">
            <div>DATA - AI Innovation Lab</div>
            <div>Confidential / Technical Reference</div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
